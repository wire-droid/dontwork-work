<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Mute Button Smasher - Toggle Audio Forever | DontWork.work</title>
  <meta name="description" content="Mute and unmute endlessly. Did they hear that? Better click again to be sure!">
  <meta name="keywords" content="mute button, video call, zoom mute, meeting game, toggle mute">
  
  <meta property="og:title" content="Mute Button Smasher - Click Click Click">
  <meta property="og:description" content="Toggle mute endlessly. Are you muted? Better check!">
  <meta property="og:image" content="https://dontwork.work/og-image.jpg">
  <meta property="og:url" content="https://dontwork.work/mute-smasher.html">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mute Button Smasher">
  <meta name="twitter:description" content="Mute anxiety simulator. Click forever!">
  <meta name="twitter:image" content="https://dontwork.work/twitter-card.jpg">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
      color: white;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .video-interface {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    
    .status-display {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
    }
    
    .status-icon {
      font-size: 8rem;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    
    .status-icon.muted {
      opacity: 0.5;
    }
    
    .status-text {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
    }
    
    .status-text.muted {
      color: #F44336;
    }
    
    .status-text.unmuted {
      color: #4CAF50;
    }
    
    .mute-button {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      font-size: 3.5rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      position: relative;
    }
    
    .mute-button.muted {
      background: #F44336;
    }
    
    .mute-button.unmuted {
      background: #4CAF50;
    }
    
    .mute-button:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    
    .mute-button:active {
      transform: scale(0.95);
    }
    
    .click-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      opacity: 0;
      pointer-events: none;
    }
    
    .click-indicator.show {
      animation: clickPulse 0.4s;
    }
    
    @keyframes clickPulse {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
    }
    
    .warnings {
      background: rgba(255, 152, 0, 0.2);
      border: 2px solid #FF9800;
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
    }
    
    .warning-item {
      padding: 10px;
      margin-bottom: 8px;
      font-size: 0.95rem;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .anxiety-meter {
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 20px;
      margin-top: 30px;
    }
    
    .anxiety-label {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 15px;
    }
    
    .anxiety-bar-container {
      background: rgba(255,255,255,0.1);
      height: 40px;
      border-radius: 20px;
      overflow: hidden;
    }
    
    .anxiety-bar {
      background: linear-gradient(90deg, #4CAF50 0%, #FF9800 50%, #F44336 100%);
      height: 100%;
      width: 0%;
      transition: width 0.5s;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    .stat-box {
      background: rgba(255,255,255,0.2);
      padding: 20px 30px;
      border-radius: 12px;
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 5px;
    }
    
    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      margin-top: 30px;
      transition: all 0.3s;
    }
    
    .back-link:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <!-- AD PLACEHOLDER - Top -->
  
  <div class="container">
    <h1>🔇 Mute Button Smasher</h1>
    <p class="subtitle">Click. Wait. Did they hear that? Click again.</p>
    
    <div class="video-interface">
      <div class="status-display">
        <div class="status-icon" id="statusIcon">🎤</div>
        <div class="status-text unmuted" id="statusText">UNMUTED</div>
      </div>
      
      <button class="mute-button unmuted" id="muteButton" onclick="toggleMute()">
        <span id="buttonIcon">🎤</span>
        <div class="click-indicator" id="clickIndicator">💥</div>
      </button>
      
      <div class="warnings" id="warnings" style="display: none;">
        <div style="font-weight: 700; margin-bottom: 10px;">⚠️ ANXIETY TRIGGERS:</div>
        <div id="warningsList"></div>
      </div>
      
      <div class="anxiety-meter">
        <div class="anxiety-label">MUTE ANXIETY: <span id="anxietyText">LOW</span></div>
        <div class="anxiety-bar-container">
          <div class="anxiety-bar" id="anxietyBar">0%</div>
        </div>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="toggles">0</div>
        <div class="stat-label">Times Toggled</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="clicksPerMin">0</div>
        <div class="stat-label">Clicks/Minute</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="maxStreak">0</div>
        <div class="stat-label">Max Click Streak</div>
      </div>
    </div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
  <!-- AD PLACEHOLDER - Bottom -->
  
  <script>
    const warnings = [
      "Someone just said your name",
      "You hear background noise",
      "Did you just cough?",
      "Your dog is barking",
      "Was that the doorbell?",
      "Kids screaming in background",
      "Delivery person knocking",
      "Someone is talking to you IRL",
      "You need to sneeze",
      "Your stomach just rumbled",
      "Phone is ringing",
      "Boss is asking a question",
      "Did everyone hear that?",
      "Awkward silence forming",
      "You're about to speak"
    ];
    
    let isMuted = false;
    let toggleCount = 0;
    let anxietyLevel = 0;
    let recentClicks = [];
    let maxStreak = 0;
    let currentStreak = 0;
    let lastClickTime = 0;
    
    function toggleMute() {
      isMuted = !isMuted;
      toggleCount++;
      
      const now = Date.now();
      recentClicks.push(now);
      
      // Track streak (clicks within 2 seconds)
      if (now - lastClickTime < 2000) {
        currentStreak++;
        if (currentStreak > maxStreak) {
          maxStreak = currentStreak;
        }
      } else {
        currentStreak = 1;
      }
      lastClickTime = now;
      
      // Remove clicks older than 1 minute
      recentClicks = recentClicks.filter(time => now - time < 60000);
      
      // Update UI
      const button = document.getElementById('muteButton');
      const icon = document.getElementById('buttonIcon');
      const statusIcon = document.getElementById('statusIcon');
      const statusText = document.getElementById('statusText');
      const indicator = document.getElementById('clickIndicator');
      
      if (isMuted) {
        button.className = 'mute-button muted';
        icon.textContent = '🔇';
        statusIcon.textContent = '🔇';
        statusIcon.className = 'status-icon muted';
        statusText.textContent = 'MUTED';
        statusText.className = 'status-text muted';
      } else {
        button.className = 'mute-button unmuted';
        icon.textContent = '🎤';
        statusIcon.textContent = '🎤';
        statusIcon.className = 'status-icon';
        statusText.textContent = 'UNMUTED';
        statusText.className = 'status-text unmuted';
      }
      
      // Click animation
      indicator.classList.remove('show');
      setTimeout(() => indicator.classList.add('show'), 10);
      
      // Increase anxiety
      anxietyLevel = Math.min(100, anxietyLevel + 5);
      
      // Random warning
      if (Math.random() < 0.3) {
        addWarning();
      }
      
      updateAnxiety();
      updateStats();
    }
    
    function addWarning() {
      const warningText = warnings[Math.floor(Math.random() * warnings.length)];
      const warningsDiv = document.getElementById('warnings');
      const list = document.getElementById('warningsList');
      
      const item = document.createElement('div');
      item.className = 'warning-item';
      item.textContent = '⚠️ ' + warningText;
      list.appendChild(item);
      
      warningsDiv.style.display = 'block';
      
      // Keep only last 5 warnings
      const items = list.querySelectorAll('.warning-item');
      if (items.length > 5) {
        items[0].remove();
      }
      
      // Increase anxiety from warnings
      anxietyLevel = Math.min(100, anxietyLevel + 10);
      updateAnxiety();
    }
    
    function updateAnxiety() {
      const bar = document.getElementById('anxietyBar');
      const text = document.getElementById('anxietyText');
      
      bar.style.width = anxietyLevel + '%';
      bar.textContent = Math.floor(anxietyLevel) + '%';
      
      if (anxietyLevel < 30) text.textContent = 'LOW';
      else if (anxietyLevel < 60) text.textContent = 'MODERATE';
      else if (anxietyLevel < 80) text.textContent = 'HIGH';
      else text.textContent = 'EXTREME';
    }
    
    function updateStats() {
      document.getElementById('toggles').textContent = toggleCount;
      document.getElementById('clicksPerMin').textContent = recentClicks.length;
      document.getElementById('maxStreak').textContent = maxStreak;
    }
    
    // Decrease anxiety over time
    setInterval(() => {
      anxietyLevel = Math.max(0, anxietyLevel - 1);
      updateAnxiety();
    }, 1000);
    
    // Spacebar to toggle
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        toggleMute();
      }
    });
    
    // Load saved stats
    const saved = localStorage.getItem('muteSmashStats');
    if (saved) {
      const stats = JSON.parse(saved);
      toggleCount = stats.toggles || 0;
      maxStreak = stats.maxStreak || 0;
    }
    
    // Save on unload
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('muteSmashStats', JSON.stringify({
        toggles: toggleCount,
        maxStreak: maxStreak
      }));
    });
    
    updateStats();
  </script>
  
  <script src="/js/panic-button.js"></script>
</body>
</html>
