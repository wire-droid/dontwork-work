<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Pen Clicker - Annoy Your Coworkers | DontWork.work</title>
  <meta name="description" content="Click pen endlessly. Track clicks. Measure coworker annoyance. Oddly satisfying!">
  <meta name="keywords" content="pen clicker, fidget game, office annoyance, click counter, stress relief">
  
  <meta property="og:title" content="Pen Clicker - Click Click Click">
  <meta property="og:description" content="Click pen infinitely. Annoy everyone. Satisfaction guaranteed!">
  <meta property="og:image" content="https://dontwork.work/og-image.jpg">
  <meta property="og:url" content="https://dontwork.work/pen-clicker.html">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Pen Clicker">
  <meta name="twitter:description" content="Endless pen clicking. Maximum annoyance. Pure satisfaction.">
  <meta name="twitter:image" content="https://dontwork.work/twitter-card.jpg">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #16a085 0%, #f4d03f 100%);
      min-height: 100vh;
      padding: 20px;
      user-select: none;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
      color: white;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .pen-area {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 60px 40px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    
    .pen-container {
      cursor: pointer;
      display: inline-block;
      transition: all 0.1s;
      margin-bottom: 30px;
    }
    
    .pen-container:hover {
      transform: scale(1.05);
    }
    
    .pen-container:active {
      transform: scale(0.95);
    }
    
    .pen-container.clicking {
      animation: click 0.15s;
    }
    
    @keyframes click {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .pen {
      font-size: 12rem;
      line-height: 1;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }
    
    .click-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 1.5rem;
      font-weight: 700;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Fraunces', serif;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }
    
    .click-btn:hover {
      background: #c0392b;
      transform: translateY(-3px);
      box-shadow: 0 7px 25px rgba(0,0,0,0.4);
    }
    
    .click-btn:active {
      transform: translateY(0);
    }
    
    .annoyance-meter {
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 20px;
      margin: 30px 0;
    }
    
    .annoyance-label {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 15px;
    }
    
    .annoyance-bar-container {
      background: rgba(255,255,255,0.1);
      height: 40px;
      border-radius: 20px;
      overflow: hidden;
    }
    
    .annoyance-bar {
      background: linear-gradient(90deg, #2ecc71 0%, #f39c12 50%, #e74c3c 100%);
      height: 100%;
      width: 0%;
      transition: width 0.3s;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    
    .stat-box {
      background: rgba(255,255,255,0.1);
      padding: 25px 20px;
      border-radius: 15px;
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    .achievement {
      background: rgba(46, 204, 113, 0.3);
      border: 2px solid #2ecc71;
      padding: 15px 25px;
      border-radius: 12px;
      margin: 10px;
      display: inline-block;
      animation: popIn 0.5s;
      font-weight: 700;
    }
    
    @keyframes popIn {
      0% { transform: scale(0) rotate(-180deg); }
      50% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    
    .warning {
      background: rgba(255,255,255,0.2);
      padding: 15px 20px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 0.95rem;
    }
    
    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      margin-top: 30px;
      transition: all 0.3s;
    }
    
    .back-link:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <!-- AD PLACEHOLDER - Top -->
  
  <div class="container">
    <h1>🖊️ Pen Clicker</h1>
    <p class="subtitle">Click. Click. Click. Click. Click.</p>
    
    <div class="pen-area">
      <div class="pen-container" id="penContainer" onclick="clickPen()">
        <div class="pen">🖊️</div>
      </div>
      
      <button class="click-btn" onclick="clickPen()">CLICK PEN</button>
      
      <div class="annoyance-meter">
        <div class="annoyance-label">COWORKER ANNOYANCE: <span id="annoyanceText">TOLERABLE</span></div>
        <div class="annoyance-bar-container">
          <div class="annoyance-bar" id="annoyanceBar"></div>
        </div>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="clickCount">0</div>
        <div class="stat-label">Total Clicks</div>
      </div>
      
      <div class="stat-box">
        <div class="stat-number" id="cps">0</div>
        <div class="stat-label">Clicks Per Second</div>
      </div>
      
      <div class="stat-box">
        <div class="stat-number" id="highScore">0</div>
        <div class="stat-label">Best Streak</div>
      </div>
    </div>
    
    <div id="achievements"></div>
    
    <div class="warning">
      ⚠️ Not responsible for HR complaints about excessive pen clicking
    </div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
  <!-- AD PLACEHOLDER - Bottom -->
  
  <script>
    let totalClicks = 0;
    let clicksThisSecond = 0;
    let currentCPS = 0;
    let highScore = 0;
    let annoyanceLevel = 0;
    
    const achievements = [
      { at: 10, text: "🏆 First 10 Clicks" },
      { at: 50, text: "✨ Half Century" },
      { at: 100, text: "💯 Century!" },
      { at: 250, text: "🔥 Click Master" },
      { at: 500, text: "⚡ Lightning Clicker" },
      { at: 1000, text: "🎯 Thousand Club" },
      { at: 2500, text: "💪 Click Champion" },
      { at: 5000, text: "🌟 Elite Clicker" },
      { at: 10000, text: "👑 Click Royalty" },
      { at: 25000, text: "🚀 Legendary Clicker" }
    ];
    
    const annoyanceLevels = [
      { at: 0, text: 'TOLERABLE' },
      { at: 20, text: 'SLIGHTLY ANNOYED' },
      { at: 40, text: 'GETTING IRRITATED' },
      { at: 60, text: 'VERY ANNOYED' },
      { at: 80, text: 'READY TO SNAP' },
      { at: 95, text: 'CALL HR IMMEDIATELY' }
    ];
    
    function clickPen() {
      totalClicks++;
      clicksThisSecond++;
      annoyanceLevel = Math.min(100, annoyanceLevel + 1);
      
      // Animate pen
      const penContainer = document.getElementById('penContainer');
      penContainer.classList.add('clicking');
      setTimeout(() => penContainer.classList.remove('clicking'), 150);
      
      updateStats();
      checkAchievements();
    }
    
    function updateStats() {
      document.getElementById('clickCount').textContent = totalClicks.toLocaleString();
      document.getElementById('cps').textContent = currentCPS;
      document.getElementById('highScore').textContent = highScore;
      
      // Update annoyance bar
      const bar = document.getElementById('annoyanceBar');
      bar.style.width = annoyanceLevel + '%';
      bar.textContent = Math.floor(annoyanceLevel) + '%';
      
      // Update annoyance text
      let text = annoyanceLevels[0].text;
      for (let i = annoyanceLevels.length - 1; i >= 0; i--) {
        if (annoyanceLevel >= annoyanceLevels[i].at) {
          text = annoyanceLevels[i].text;
          break;
        }
      }
      document.getElementById('annoyanceText').textContent = text;
    }
    
    function checkAchievements() {
      const unlocked = localStorage.getItem('penClickerAchievements') || '';
      achievements.forEach(ach => {
        if (totalClicks >= ach.at && !unlocked.includes(ach.at.toString())) {
          showAchievement(ach.text);
          localStorage.setItem('penClickerAchievements', unlocked + ',' + ach.at);
        }
      });
    }
    
    function showAchievement(text) {
      const div = document.createElement('div');
      div.className = 'achievement';
      div.textContent = text;
      document.getElementById('achievements').appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }
    
    // Track CPS
    setInterval(() => {
      currentCPS = clicksThisSecond;
      if (currentCPS > highScore) {
        highScore = currentCPS;
      }
      clicksThisSecond = 0;
      updateStats();
    }, 1000);
    
    // Decay annoyance
    setInterval(() => {
      if (annoyanceLevel > 0) {
        annoyanceLevel = Math.max(0, annoyanceLevel - 0.5);
        updateStats();
      }
    }, 1000);
    
    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        clickPen();
      }
    });
    
    // Load saved stats
    const saved = localStorage.getItem('totalPenClicks');
    const savedHS = localStorage.getItem('penClickHighScore');
    if (saved) totalClicks = parseInt(saved);
    if (savedHS) highScore = parseInt(savedHS);
    
    // Save on unload
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('totalPenClicks', totalClicks);
      localStorage.setItem('penClickHighScore', highScore);
    });
    
    updateStats();
  </script>
  
  <script src="/js/panic-button.js"></script>
</body>
</html>
