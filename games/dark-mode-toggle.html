<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Dark Mode Toggle - Light vs Dark Forever | DontWork.work</title>
  <meta name="description" content="Toggle dark mode endlessly. Light mode? Dark mode? Can't decide? Toggle forever!">
  <meta name="keywords" content="dark mode, light mode, theme toggle, dark mode game, theme switcher">
  
  <meta property="og:title" content="Dark Mode Toggle - Never Settle">
  <meta property="og:description" content="Toggle between light and dark mode forever!">
  <meta property="og:image" content="https://dontwork.work/og-image.jpg">
  <meta property="og:url" content="https://dontwork.work/dark-mode-toggle.html">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dark Mode Toggle">
  <meta name="twitter:description" content="Light? Dark? Toggle endlessly!">
  <meta name="twitter:image" content="https://dontwork.work/twitter-card.jpg">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: white;
      color: #333;
      min-height: 100vh;
      padding: 20px;
      transition: all 0.3s;
    }
    
    body.dark {
      background: #1a1a1a;
      color: #f0f0f0;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      margin-bottom: 10px;
      transition: all 0.3s;
    }
    
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 40px;
    }
    
    .toggle-area {
      background: #f5f5f5;
      border-radius: 25px;
      padding: 60px 40px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      transition: all 0.3s;
    }
    
    body.dark .toggle-area {
      background: #2a2a2a;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    
    .mode-icon {
      font-size: 8rem;
      margin-bottom: 30px;
      transition: all 0.3s;
    }
    
    .mode-label {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    
    .mode-description {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 40px;
    }
    
    .toggle-switch {
      position: relative;
      width: 200px;
      height: 100px;
      background: #ccc;
      border-radius: 50px;
      margin: 0 auto 40px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    body.dark .toggle-switch {
      background: #4a4a4a;
    }
    
    .toggle-circle {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    
    body.dark .toggle-circle {
      left: 110px;
      background: #1a1a1a;
    }
    
    .toggle-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 20px 60px;
      font-size: 1.3rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Fraunces', serif;
    }
    
    .toggle-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    
    .toggle-btn:active {
      transform: translateY(0);
    }
    
    .preference {
      background: #f0f0f0;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
      transition: all 0.3s;
    }
    
    body.dark .preference {
      background: #2a2a2a;
    }
    
    .preference-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 15px;
    }
    
    .preference-bar-container {
      background: #ddd;
      height: 40px;
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s;
    }
    
    body.dark .preference-bar-container {
      background: #3a3a3a;
    }
    
    .preference-bar {
      height: 100%;
      width: 50%;
      transition: all 0.5s;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    .preference-bar.light {
      background: linear-gradient(90deg, #f39c12 0%, #f1c40f 100%);
      color: white;
    }
    
    .preference-bar.dark {
      background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
      color: white;
    }
    
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    .stat-box {
      background: #f0f0f0;
      padding: 20px 30px;
      border-radius: 12px;
      transition: all 0.3s;
    }
    
    body.dark .stat-box {
      background: #2a2a2a;
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 5px;
    }
    
    .back-link {
      display: inline-block;
      color: inherit;
      text-decoration: none;
      padding: 15px 30px;
      background: #f0f0f0;
      border-radius: 12px;
      margin-top: 30px;
      transition: all 0.3s;
    }
    
    body.dark .back-link {
      background: #2a2a2a;
    }
    
    .back-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <!-- AD PLACEHOLDER - Top -->
  
  <div class="container">
    <h1>🌓 Dark Mode Toggle</h1>
    <p class="subtitle">Light mode? Dark mode? Why not both?</p>
    
    <div class="preference">
      <div class="preference-title">YOUR PREFERENCE: <span id="preferenceText">UNDECIDED</span></div>
      <div class="preference-bar-container">
        <div class="preference-bar light" id="preferenceBar">50% Light</div>
      </div>
    </div>
    
    <div class="toggle-area">
      <div class="mode-icon" id="modeIcon">☀️</div>
      <div class="mode-label" id="modeLabel">Light Mode</div>
      <div class="mode-description" id="modeDescription">
        Bright and cheerful. Easy on the eyes during the day.
      </div>
      
      <div class="toggle-switch" onclick="toggle()">
        <div class="toggle-circle" id="toggleCircle">☀️</div>
      </div>
      
      <button class="toggle-btn" onclick="toggle()">
        Toggle Mode
      </button>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="toggles">0</div>
        <div class="stat-label">Total Toggles</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="lightTime">0s</div>
        <div class="stat-label">Time in Light</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="darkTime">0s</div>
        <div class="stat-label">Time in Dark</div>
      </div>
    </div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
  <!-- AD PLACEHOLDER - Bottom -->
  
  <script>
    let isDark = false;
    let toggleCount = 0;
    let lightTime = 0;
    let darkTime = 0;
    let lastToggle = Date.now();
    
    function toggle() {
      // Track time in previous mode
      const now = Date.now();
      const elapsed = Math.floor((now - lastToggle) / 1000);
      
      if (isDark) {
        darkTime += elapsed;
      } else {
        lightTime += elapsed;
      }
      
      isDark = !isDark;
      toggleCount++;
      lastToggle = now;
      
      updateUI();
      updateStats();
      updatePreference();
    }
    
    function updateUI() {
      const body = document.body;
      const icon = document.getElementById('modeIcon');
      const label = document.getElementById('modeLabel');
      const description = document.getElementById('modeDescription');
      const circle = document.getElementById('toggleCircle');
      
      if (isDark) {
        body.classList.add('dark');
        icon.textContent = '🌙';
        circle.textContent = '🌙';
        label.textContent = 'Dark Mode';
        description.textContent = 'Sleek and modern. Perfect for late-night browsing.';
      } else {
        body.classList.remove('dark');
        icon.textContent = '☀️';
        circle.textContent = '☀️';
        label.textContent = 'Light Mode';
        description.textContent = 'Bright and cheerful. Easy on the eyes during the day.';
      }
    }
    
    function updatePreference() {
      const total = lightTime + darkTime;
      if (total === 0) {
        document.getElementById('preferenceText').textContent = 'UNDECIDED';
        document.getElementById('preferenceBar').textContent = '50% Light';
        document.getElementById('preferenceBar').style.width = '50%';
        return;
      }
      
      const lightPercent = Math.floor((lightTime / total) * 100);
      const darkPercent = 100 - lightPercent;
      const bar = document.getElementById('preferenceBar');
      
      if (lightPercent > darkPercent) {
        bar.className = 'preference-bar light';
        bar.style.width = lightPercent + '%';
        bar.textContent = lightPercent + '% Light';
        document.getElementById('preferenceText').textContent = 'LIGHT MODE';
      } else if (darkPercent > lightPercent) {
        bar.className = 'preference-bar dark';
        bar.style.width = darkPercent + '%';
        bar.textContent = darkPercent + '% Dark';
        document.getElementById('preferenceText').textContent = 'DARK MODE';
      } else {
        bar.className = 'preference-bar light';
        bar.style.width = '50%';
        bar.textContent = '50-50 Split';
        document.getElementById('preferenceText').textContent = 'PERFECTLY BALANCED';
      }
    }
    
    function updateStats() {
      document.getElementById('toggles').textContent = toggleCount;
      document.getElementById('lightTime').textContent = lightTime + 's';
      document.getElementById('darkTime').textContent = darkTime + 's';
    }
    
    // Update time every second
    setInterval(() => {
      const now = Date.now();
      const elapsed = Math.floor((now - lastToggle) / 1000);
      
      if (isDark) {
        darkTime += 1;
      } else {
        lightTime += 1;
      }
      
      lastToggle = now;
      updateStats();
      updatePreference();
    }, 1000);
    
    // Load saved stats
    const saved = localStorage.getItem('darkModeToggleStats');
    if (saved) {
      const stats = JSON.parse(saved);
      toggleCount = stats.toggles || 0;
      lightTime = stats.lightTime || 0;
      darkTime = stats.darkTime || 0;
      isDark = stats.isDark || false;
    }
    
    // Save on unload
    window.addEventListener('beforeunload', () => {
      const now = Date.now();
      const elapsed = Math.floor((now - lastToggle) / 1000);
      
      if (isDark) {
        darkTime += elapsed;
      } else {
        lightTime += elapsed;
      }
      
      localStorage.setItem('darkModeToggleStats', JSON.stringify({
        toggles: toggleCount,
        lightTime: lightTime,
        darkTime: darkTime,
        isDark: isDark
      }));
    });
    
    updateUI();
    updateStats();
    updatePreference();
  </script>
  
  <script src="/js/panic-button.js"></script>
</body>
</html>
