<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Coffee Drinking Simulator - Caffeine Overload | DontWork.work</title>
  <meta name="description" content="Drink virtual coffee until you get the jitters. Track your caffeine intake. Sleep is for the weak!">
  <meta name="keywords" content="coffee simulator, caffeine game, coffee addiction, office coffee, productivity boost">
  
  <meta property="og:title" content="Coffee Drinking Simulator - Get Caffeinated">
  <meta property="og:description" content="Drink coffee. Get jittery. Embrace the caffeine addiction!">
  <meta property="og:image" content="https://dontwork.work/og-image.jpg">
  <meta property="og:url" content="https://dontwork.work/coffee-simulator.html">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Coffee Drinking Simulator">
  <meta name="twitter:description" content="Virtual coffee. Real jitters. Unlimited refills!">
  <meta name="twitter:image" content="https://dontwork.work/twitter-card.jpg">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #6F4E37 0%, #3E2723 100%);
      min-height: 100vh;
      padding: 20px;
      transition: transform 0.1s;
    }
    
    body.jittery {
      animation: jitter 0.1s infinite;
    }
    
    @keyframes jitter {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(-1px, 1px) rotate(-0.5deg); }
      50% { transform: translate(1px, -1px) rotate(0.5deg); }
      75% { transform: translate(-1px, -1px) rotate(-0.5deg); }
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      color: white;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .coffee-container {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    
    .coffee-cup {
      width: 200px;
      height: 200px;
      margin: 0 auto 30px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    
    .coffee-cup:hover {
      transform: scale(1.1);
    }
    
    .coffee-cup:active {
      transform: scale(0.95);
    }
    
    .cup-emoji {
      font-size: 12rem;
      line-height: 1;
      transition: all 0.2s;
    }
    
    .cup-emoji.drinking {
      transform: rotate(45deg);
    }
    
    .drink-btn {
      background: #D2691E;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 1.5rem;
      font-weight: 700;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Fraunces', serif;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .drink-btn:hover {
      background: #8B4513;
      transform: translateY(-3px);
      box-shadow: 0 7px 25px rgba(0,0,0,0.4);
    }
    
    .drink-btn:active {
      transform: translateY(0);
    }
    
    .meters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    
    .meter-box {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
    }
    
    .meter-label {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .meter-bar-container {
      background: rgba(255,255,255,0.1);
      height: 30px;
      border-radius: 15px;
      overflow: hidden;
    }
    
    .meter-bar {
      height: 100%;
      transition: width 0.3s, background-color 0.3s;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }
    
    .caffeine-bar {
      background: linear-gradient(90deg, #D2691E 0%, #8B4513 100%);
    }
    
    .heart-bar {
      background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
    }
    
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    .stat-box {
      background: rgba(255,255,255,0.1);
      padding: 20px 30px;
      border-radius: 12px;
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }
    
    .status-message {
      background: rgba(255,255,255,0.2);
      padding: 15px 25px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      margin-top: 30px;
      transition: all 0.3s;
    }
    
    .back-link:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <!-- AD PLACEHOLDER - Top -->
  
  <div class="container">
    <h1>☕ Coffee Drinking Simulator</h1>
    <p class="subtitle">Unlimited refills. Limited productivity.</p>
    
    <div class="coffee-container">
      <div class="coffee-cup" onclick="drinkCoffee()">
        <div class="cup-emoji" id="cupEmoji">☕</div>
      </div>
      
      <button class="drink-btn" onclick="drinkCoffee()">DRINK COFFEE</button>
    </div>
    
    <div class="meters">
      <div class="meter-box">
        <div class="meter-label">CAFFEINE LEVEL</div>
        <div class="meter-bar-container">
          <div class="meter-bar caffeine-bar" id="caffeineBar" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="meter-box">
        <div class="meter-label">HEART RATE</div>
        <div class="meter-bar-container">
          <div class="meter-bar heart-bar" id="heartBar" style="width: 50%">♥ 70 BPM</div>
        </div>
      </div>
    </div>
    
    <div class="status-message" id="statusMessage">
      Click the coffee to start your day...
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="cupCount">0</div>
        <div class="stat-label">Cups Consumed</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="caffeineLevel">0mg</div>
        <div class="stat-label">Total Caffeine</div>
      </div>
    </div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
  <!-- AD PLACEHOLDER - Bottom -->
  
  <script>
    let cupsConsumed = 0;
    let totalCaffeine = 0;
    let caffeineLevel = 0;
    let heartRate = 70;
    
    const messages = [
      { at: 0, text: "☕ Click the coffee to start your day..." },
      { at: 1, text: "😊 Ahh, that first sip hits different." },
      { at: 2, text: "🙂 Feeling good. Maybe one more..." },
      { at: 3, text: "😃 Getting energized! Productivity incoming!" },
      { at: 4, text: "😅 Starting to feel a little wired..." },
      { at: 5, text: "😰 Hands getting a bit shaky..." },
      { at: 7, text: "😵 Can see sounds. Can hear colors." },
      { at: 10, text: "🤯 MAXIMUM CAFFEINE. TRANSCENDING REALITY." },
      { at: 15, text: "👻 You have become coffee. Coffee is you." },
      { at: 20, text: "⚡ UNLIMITED POWER. SLEEP IS WEAKNESS." }
    ];
    
    function drinkCoffee() {
      cupsConsumed++;
      totalCaffeine += 95; // Average cup has 95mg
      caffeineLevel = Math.min(100, caffeineLevel + 15);
      heartRate = Math.min(180, 70 + (cupsConsumed * 8));
      
      // Animate cup
      const cupEmoji = document.getElementById('cupEmoji');
      cupEmoji.classList.add('drinking');
      setTimeout(() => cupEmoji.classList.remove('drinking'), 300);
      
      // Update UI
      updateStats();
      updateMessage();
      
      // Add jitter effect at high caffeine
      if (caffeineLevel >= 60) {
        document.body.classList.add('jittery');
      }
      
      // Decay caffeine over time
      setTimeout(() => {
        caffeineLevel = Math.max(0, caffeineLevel - 5);
        updateStats();
        if (caffeineLevel < 60) {
          document.body.classList.remove('jittery');
        }
      }, 5000);
    }
    
    function updateStats() {
      document.getElementById('cupCount').textContent = cupsConsumed;
      document.getElementById('caffeineLevel').textContent = totalCaffeine + 'mg';
      
      const caffeineBar = document.getElementById('caffeineBar');
      caffeineBar.style.width = caffeineLevel + '%';
      caffeineBar.textContent = Math.floor(caffeineLevel) + '%';
      
      const heartBar = document.getElementById('heartBar');
      const heartPercent = ((heartRate - 60) / 120) * 100;
      heartBar.style.width = Math.min(100, heartPercent) + '%';
      heartBar.textContent = '♥ ' + heartRate + ' BPM';
    }
    
    function updateMessage() {
      let msg = messages[0].text;
      for (let i = messages.length - 1; i >= 0; i--) {
        if (cupsConsumed >= messages[i].at) {
          msg = messages[i].text;
          break;
        }
      }
      document.getElementById('statusMessage').textContent = msg;
    }
    
    // Load saved stats
    const savedCups = localStorage.getItem('totalCupsConsumed');
    if (savedCups) {
      cupsConsumed = parseInt(savedCups);
      totalCaffeine = cupsConsumed * 95;
    }
    
    // Save on unload
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('totalCupsConsumed', cupsConsumed);
    });
    
    updateStats();
    updateMessage();
  </script>
  
  <script src="/js/panic-button.js"></script>
</body>
</html>
