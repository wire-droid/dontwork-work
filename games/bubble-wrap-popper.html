    // Initialize game
    function init() {
      createBubbles(200); // 200 bubbles
      loadHighScore();
      startTimer();
    }
    
    function createBubbles(count) {
      const grid = document.getElementById('bubbleGrid');
      grid.innerHTML = '';
      
      for (let i = 0; i < count; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.onclick = () => popBubble(bubble);
        grid.appendChild(bubble);
      }
    }
    
    function popBubble(bubble) {
      if (bubble.classList.contains('popped')) return;
      
      bubble.classList.add('popped');
      popCount++;
      
      document.getElementById('popCount').textContent = popCount;
      
      // Play sound
      if (soundEnabled) {
        playPopSound();
      }
      
      // Update high score
      const highScore = parseInt(localStorage.getItem('bubbleWrapHighScore') || '0');
      if (popCount > highScore) {
        localStorage.setItem('bubbleWrapHighScore', popCount);
        document.getElementById('highScore').textContent = popCount;
      }
    }
    
    function playPopSound() {
      // Create simple pop sound using Web Audio API
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.1);
    }
    
    function startTimer() {
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        document.getElementById('timeWasted').textContent = 
          `${minutes}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }
    
    function resetBubbles() {
      popCount = 0;
      startTime = Date.now();
      document.getElementById('popCount').textContent = '0';
      createBubbles(200);
    }
    
    function loadHighScore() {
      const highScore = localStorage.getItem('bubbleWrapHighScore') || '0';
      document.getElementById('highScore').textContent = highScore;
    }
    
    function toggleSound() {
      soundEnabled = !soundEnabled;
      document.getElementById('soundStatus').textContent = 
        soundEnabled ? 'Sound: ON' : 'Sound: OFF';
    }
    
    // Share Card System
    function showShareCard() {
      const card = selectRandomCard();
      displayCard(card);
      updateCollectionTracker(card.id);
      document.getElementById('shareModal').classList.add('active');
    }
    
    function selectRandomCard() {
      const seenCards = JSON.parse(localStorage.getItem('seenBubbleWrapCards') || '[]');
      const unseenCards = CARDS.filter(c => !seenCards.includes(c.id));
      
      // 70% chance to show unseen card
      const pool = (Math.random() < 0.7 && unseenCards.length > 0) ? unseenCards : CARDS;
      const card = pool[Math.floor(Math.random() * pool.length)];
      
      // Mark as seen
      if (!seenCards.includes(card.id)) {
        seenCards.push(card.id);
        localStorage.setItem('seenBubbleWrapCards', JSON.stringify(seenCards));
      }
      
      return card;
    }
    
    function displayCard(card) {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      const timeStr = `${minutes} min ${seconds} sec`;
      
      let content = card.content
        .replace(/\{POPS\}/g, popCount)
        .replace(/\{TIME\}/g, timeStr);
      
      document.getElementById('cardContent').textContent = content;
      
      // Store for sharing
      window.currentCard = card;
      window.currentStats = { pops: popCount, time: timeStr };
    }
    
    function updateCollectionTracker(cardId) {
      const seenCards = JSON.parse(localStorage.getItem('seenBubbleWrapCards') || '[]');
      const total = CARDS.length;
      const seen = seenCards.length;
      
      let stars = '';
      for (let i = 0; i < total; i++) {
        stars += i < seen ? '⭐' : '⬜';
      }
      
      document.getElementById('collectionStars').textContent = stars;
      document.getElementById('collectionCount').textContent = `${seen}/${total}`;
    }
    
    function shareTwitter() {
      const card = window.currentCard;
      const stats = window.currentStats;
      let text = card.shareText
        .replace(/\{POPS\}/g, stats.pops)
        .replace(/\{TIME\}/g, stats.time);
      
      const url = `https://dontwork.work/games/bubble-wrap?score=${stats.pops}`;
      const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
      
      window.open(twitterUrl, '_blank');
    }
    
    function copyLink() {
      const url = `https://dontwork.work/games/bubble-wrap?score=${popCount}`;
      navigator.clipboard.writeText(url).then(() => {
        alert('Link copied to clipboard! 📋');
      });
    }
    
    function downloadCard() {
      const cardContent = document.getElementById('cardContent').textContent;
      const blob = new Blob([cardContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bubble-wrap-card.txt';
      a.click();
    }
    
    function closeModal() {
      document.getElementById('shareModal').classList.remove('active');
    }
    
    function closeModalAndReset() {
      closeModal();
      resetBubbles();
    }
    
    // Initialize on load
    init();
  </script>
