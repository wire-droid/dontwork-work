<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Password Generator - Impossible Requirements | DontWork.work</title>
  <meta name="description" content="Meet increasingly absurd password requirements. 47 characters, 3 emojis, your blood type!">
  <meta name="keywords" content="password generator, password requirements, security game, absurd passwords, password hell">
  
  <meta property="og:title" content="Password Generator - Meet The Requirements">
  <meta property="og:description" content="Requirements get more absurd with each attempt. Good luck!">
  <meta property="og:image" content="https://dontwork.work/og-image.jpg">
  <meta property="og:url" content="https://dontwork.work/password-generator.html">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Password Generator">
  <meta name="twitter:description" content="Increasingly absurd password requirements. Pure chaos!">
  <meta name="twitter:image" content="https://dontwork.work/twitter-card.jpg">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #141E30 0%, #243B55 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      text-align: center;
      color: white;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 7vw, 3.5rem);
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .password-area {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    
    .password-input {
      width: 100%;
      padding: 20px;
      font-size: 1.2rem;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
      color: white;
      margin-bottom: 20px;
      font-family: 'Courier New', monospace;
    }
    
    .password-input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    
    .requirements-list {
      text-align: left;
      margin-top: 20px;
    }
    
    .requirement {
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }
    
    .requirement.met {
      background: rgba(76, 175, 80, 0.2);
      border-left: 4px solid #4CAF50;
    }
    
    .requirement.unmet {
      background: rgba(244, 67, 54, 0.2);
      border-left: 4px solid #F44336;
    }
    
    .requirement-icon {
      font-size: 1.2rem;
    }
    
    .requirement-text {
      flex: 1;
      font-size: 0.95rem;
    }
    
    .btn {
      padding: 18px 40px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Fraunces', serif;
      margin: 10px;
    }
    
    .check-btn {
      background: #2196F3;
      color: white;
    }
    
    .generate-btn {
      background: #4CAF50;
      color: white;
    }
    
    .next-btn {
      background: #FF9800;
      color: white;
      display: none;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .level-display {
      background: rgba(255,255,255,0.2);
      padding: 15px 25px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    .stat-box {
      background: rgba(255,255,255,0.1);
      padding: 20px 30px;
      border-radius: 12px;
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }
    
    .message {
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      font-weight: 600;
      display: none;
    }
    
    .message.success {
      background: rgba(76, 175, 80, 0.3);
      border: 2px solid #4CAF50;
      display: block;
    }
    
    .message.error {
      background: rgba(244, 67, 54, 0.3);
      border: 2px solid #F44336;
      display: block;
    }
    
    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      margin-top: 30px;
      transition: all 0.3s;
    }
    
    .back-link:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <!-- AD PLACEHOLDER - Top -->
  
  <div class="container">
    <h1>🔐 Password Generator</h1>
    <p class="subtitle">Meet increasingly absurd requirements.</p>
    
    <div class="level-display">
      Level <span id="levelNumber">1</span> - <span id="levelTitle">Beginner</span>
    </div>
    
    <div class="password-area">
      <input type="text" class="password-input" id="passwordInput" placeholder="Enter your password...">
      
      <div class="requirements-list" id="requirementsList"></div>
      
      <div class="message" id="message"></div>
      
      <div style="margin-top: 25px;">
        <button class="btn check-btn" onclick="checkPassword()">✓ Check Password</button>
        <button class="btn generate-btn" onclick="autoGenerate()">🎲 Auto-Generate</button>
        <button class="btn next-btn" id="nextBtn" onclick="nextLevel()">→ Next Level</button>
      </div>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="currentLevel">1</div>
        <div class="stat-label">Current Level</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="maxLevel">1</div>
        <div class="stat-label">Highest Level</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="attempts">0</div>
        <div class="stat-label">Total Attempts</div>
      </div>
    </div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
  <!-- AD PLACEHOLDER - Bottom -->
  
  <script>
    const levels = [
      {
        title: 'Beginner',
        requirements: [
          { text: 'At least 8 characters', check: p => p.length >= 8 },
          { text: 'Contains a number', check: p => /\d/.test(p) },
          { text: 'Contains uppercase letter', check: p => /[A-Z]/.test(p) }
        ]
      },
      {
        title: 'Intermediate',
        requirements: [
          { text: 'At least 12 characters', check: p => p.length >= 12 },
          { text: 'Contains special character (!@#$%)', check: p => /[!@#$%^&*]/.test(p) },
          { text: 'Contains lowercase letter', check: p => /[a-z]/.test(p) },
          { text: 'Contains uppercase letter', check: p => /[A-Z]/.test(p) },
          { text: 'Contains a number', check: p => /\d/.test(p) }
        ]
      },
      {
        title: 'Advanced',
        requirements: [
          { text: 'At least 16 characters', check: p => p.length >= 16 },
          { text: 'Starts with a capital letter', check: p => /^[A-Z]/.test(p) },
          { text: 'Ends with a number', check: p => /\d$/.test(p) },
          { text: 'Contains exactly 3 numbers', check: p => (p.match(/\d/g) || []).length === 3 },
          { text: 'No repeated characters', check: p => !/(.)\1/.test(p) }
        ]
      },
      {
        title: 'Expert',
        requirements: [
          { text: 'At least 20 characters', check: p => p.length >= 20 },
          { text: 'Contains the word "password"', check: p => /password/i.test(p) },
          { text: 'Contains current year (2026)', check: p => /2026/.test(p) },
          { text: 'Sum of all digits equals 15', check: p => {
            const digits = p.match(/\d/g);
            if (!digits) return false;
            return digits.reduce((sum, d) => sum + parseInt(d), 0) === 15;
          }},
          { text: 'Contains at least 2 emoji', check: p => {
            const emojiRegex = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu;
            return (p.match(emojiRegex) || []).length >= 2;
          }}
        ]
      },
      {
        title: 'Insane',
        requirements: [
          { text: 'At least 30 characters', check: p => p.length >= 30 },
          { text: 'Contains your first name (your guess)', check: p => p.length > 0 },
          { text: 'Contains exactly 5 vowels', check: p => (p.match(/[aeiou]/gi) || []).length === 5 },
          { text: 'Every 3rd character is a number', check: p => {
            for (let i = 2; i < p.length; i += 3) {
              if (!/\d/.test(p[i])) return false;
            }
            return p.length >= 3;
          }},
          { text: 'Contains the word "secure" backwards', check: p => /eruces/i.test(p) },
          { text: 'Must be palindrome', check: p => p === p.split('').reverse().join('') }
        ]
      },
      {
        title: 'Impossible',
        requirements: [
          { text: 'Exactly 47 characters', check: p => p.length === 47 },
          { text: 'Contains prime number of vowels', check: p => {
            const count = (p.match(/[aeiou]/gi) || []).length;
            if (count < 2) return false;
            for (let i = 2; i < count; i++) {
              if (count % i === 0) return false;
            }
            return count > 1;
          }},
          { text: 'Fibonacci sequence in digits', check: p => /112358/.test(p) },
          { text: 'Contains 3 different emoji', check: p => {
            const emojiRegex = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu;
            const emojis = p.match(emojiRegex) || [];
            return new Set(emojis).size >= 3;
          }},
          { text: 'Your blood type somewhere (guess: O+)', check: p => /O\+/.test(p) }
        ]
      }
    ];
    
    let currentLevel = 0;
    let maxLevelReached = 0;
    let totalAttempts = 0;
    
    function loadLevel() {
      const level = levels[currentLevel];
      document.getElementById('levelNumber').textContent = currentLevel + 1;
      document.getElementById('levelTitle').textContent = level.title;
      
      const list = document.getElementById('requirementsList');
      list.innerHTML = '';
      
      level.requirements.forEach(req => {
        const div = document.createElement('div');
        div.className = 'requirement unmet';
        div.innerHTML = `
          <span class="requirement-icon">✗</span>
          <span class="requirement-text">${req.text}</span>
        `;
        list.appendChild(div);
      });
      
      document.getElementById('passwordInput').value = '';
      document.getElementById('message').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
    }
    
    function checkPassword() {
      const password = document.getElementById('passwordInput').value;
      const level = levels[currentLevel];
      const requirements = document.querySelectorAll('.requirement');
      
      totalAttempts++;
      let allMet = true;
      
      level.requirements.forEach((req, index) => {
        const met = req.check(password);
        const element = requirements[index];
        
        if (met) {
          element.classList.remove('unmet');
          element.classList.add('met');
          element.querySelector('.requirement-icon').textContent = '✓';
        } else {
          element.classList.remove('met');
          element.classList.add('unmet');
          element.querySelector('.requirement-icon').textContent = '✗';
          allMet = false;
        }
      });
      
      const msg = document.getElementById('message');
      if (allMet) {
        msg.className = 'message success';
        msg.textContent = '🎉 Password accepted! Proceed to next level.';
        document.getElementById('nextBtn').style.display = 'inline-block';
      } else {
        msg.className = 'message error';
        msg.textContent = '❌ Password does not meet all requirements.';
        document.getElementById('nextBtn').style.display = 'none';
      }
      
      updateStats();
    }
    
    function autoGenerate() {
      // Just generates something random that definitely won't meet requirements
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%';
      let password = '';
      for (let i = 0; i < 12; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById('passwordInput').value = password;
      checkPassword();
    }
    
    function nextLevel() {
      currentLevel++;
      if (currentLevel >= levels.length) {
        currentLevel = 0;
      }
      if (currentLevel > maxLevelReached) {
        maxLevelReached = currentLevel;
      }
      loadLevel();
      updateStats();
    }
    
    function updateStats() {
      document.getElementById('currentLevel').textContent = currentLevel + 1;
      document.getElementById('maxLevel').textContent = maxLevelReached + 1;
      document.getElementById('attempts').textContent = totalAttempts;
    }
    
    // Auto-check on input
    document.getElementById('passwordInput').addEventListener('input', () => {
      if (document.getElementById('passwordInput').value) {
        checkPassword();
      }
    });
    
    // Load saved stats
    const saved = localStorage.getItem('passwordGenStats');
    if (saved) {
      const stats = JSON.parse(saved);
      maxLevelReached = stats.maxLevel || 0;
      totalAttempts = stats.attempts || 0;
    }
    
    // Save on unload
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('passwordGenStats', JSON.stringify({
        maxLevel: maxLevelReached,
        attempts: totalAttempts
      }));
    });
    
    loadLevel();
    updateStats();
  </script>
  
  <script src="/js/panic-button.js"></script>
</body>
</html>
