<head>

      font-size: 1.5rem;

      opacity: 0.9;
      min-height: 40px;

    }
    
    .btn {
      padding: 20px 40px;
      font-size: 1.3rem;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(10px);

      font-weight: 300;
      letter-spacing: 1px;
      margin: 10px;
    }
    
    .btn:hover {
      background: rgba(255,255,255,0.3);

    }
    
    .btn-primary {
      background: rgba(255,255,255,0.9);
      color: #1e3c72;
      border-color: white;
    }
    
    .btn-primary:hover {

    }
    
    .zen-messages {

      font-size: 1.1rem;
      opacity: 0.7;
      font-style: italic;
      min-height: 30px;
    }
    
    .stats {

      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .stat {
      background: rgba(255,255,255,0.15);
      padding: 15px 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 5px;
    }
    
    .stat-value {
      font-size: 1.8rem;
      font-weight: 300;
    }
    
    /* Share Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active {
      display: flex;
    }
    
    .share-card {
      background: white;
      color: #333;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    
    .card-content {
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;

      padding: 20px;
      border-radius: 8px;

      margin: 20px 0;
      font-size: 0.85rem;
      line-height: 1.4;

    .share-buttons {

      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    .share-btn {

      border-radius: 8px;

      font-weight: bold;

    }

      top: 15px;

    function startWaiting() {
      startTime = Date.now();
      isWaiting = true;
      
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'inline-block';
      document.getElementById('status').textContent = 'Waiting...';
      
      timerInterval = setInterval(updateTimer, 1000);
      
      // Random zen messages
      setInterval(() => {
        if (isWaiting) {
          const msg = ZEN_MESSAGES[Math.floor(Math.random() * ZEN_MESSAGES.length)];
          document.getElementById('zenMessage').textContent = msg;
        }
      }, 5000);
    }
    
    function updateTimer() {
      if (!startTime) return;
      
      elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      const minutes = Math.floor(elapsedSeconds / 60);
      const seconds = elapsedSeconds % 60;
      
      document.getElementById('timer').textContent = 
        `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function stopWaiting() {
      if (!startTime) return;
      
      isWaiting = false;
      clearInterval(timerInterval);
      
      // Update stats
      updateStats();
      
      // Show share card
      setTimeout(() => showShareCard(), 500);
      
      // Reset UI
      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('status').textContent = 'Achievement unlocked!';
      document.getElementById('zenMessage').textContent = '';
    }
    
    function updateStats() {
      // Best time
      const best = parseInt(localStorage.getItem('waitingGameBest') || '0');
      if (elapsedSeconds > best) {
        localStorage.setItem('waitingGameBest', elapsedSeconds);
      }
      
      // Total time
      const total = parseInt(localStorage.getItem('waitingGameTotal') || '0');
      localStorage.setItem('waitingGameTotal', total + elapsedSeconds);
      
      loadStats();
    }
    
    function loadStats() {
      const best = parseInt(localStorage.getItem('waitingGameBest') || '0');
      const total = parseInt(localStorage.getItem('waitingGameTotal') || '0');
      
      document.getElementById('bestTime').textContent = formatTime(best);
      document.getElementById('totalTime').textContent = formatTime(total);
    }
    
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    function showShareCard() {
      const card = selectRandomCard();
      displayCard(card);
      updateCollectionTracker(card.id);
      document.getElementById('shareModal').classList.add('active');
    }
    
    function selectRandomCard() {
      const seenCards = JSON.parse(localStorage.getItem('seenWaitingCards') || '[]');
      const unseenCards = CARDS.filter(c => !seenCards.includes(c.id));
      
      const pool = (Math.random() < 0.7 && unseenCards.length > 0) ? unseenCards : CARDS;
      const card = pool[Math.floor(Math.random() * pool.length)];
      
      if (!seenCards.includes(card.id)) {
        seenCards.push(card.id);
        localStorage.setItem('seenWaitingCards', JSON.stringify(seenCards));
      }
      
      return card;
    }
    
    function displayCard(card) {
      const timeStr = formatTime(elapsedSeconds);
      const content = card.content.replace(/\{TIME\}/g, timeStr);
      
      document.getElementById('cardContent').textContent = content;
      window.currentCard = card;
      window.currentTime = timeStr;
    }
    
    function updateCollectionTracker() {
      const seenCards = JSON.parse(localStorage.getItem('seenWaitingCards') || '[]');
      const stars = seenCards.map(() => '⭐').join('') + 
                    Array(CARDS.length - seenCards.length).fill('⬜').join('');
      
      document.getElementById('collectionStars').textContent = stars;
      document.getElementById('collectionCount').textContent = 
        `${seenCards.length}/${CARDS.length}`;
    }
    
    function shareTwitter() {
      const text = window.currentCard.shareText.replace(/\{TIME\}/g, window.currentTime);
      const url = `https://dontwork.work/games/waiting-game?time=${elapsedSeconds}`;
      const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
      window.open(twitterUrl, '_blank');
    }
    
    function copyLink() {
      const url = `https://dontwork.work/games/waiting-game?time=${elapsedSeconds}`;
      navigator.clipboard.writeText(url).then(() => alert('Link copied! 📋'));
    }
    
    function closeModal() {
      document.getElementById('shareModal').classList.remove('active');
    }
    
    function closeModalAndReset() {
      closeModal();
      startTime = null;
      elapsedSeconds = 0;
      document.getElementById('timer').textContent = '0:00';
      document.getElementById('status').textContent = 'Press "Start Waiting" to begin';
    }
