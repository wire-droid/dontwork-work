<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Screenshot Organizer - Sort Endless Screenshots | DontWork.work</title>
  <meta name="description" content="Organize screenshots into folders. They never stop accumulating. Digital hoarding simulator!">
  <meta name="keywords" content="screenshot organizer, file management, digital clutter, organization game">
  
  <meta property="og:title" content="Screenshot Organizer - Endless Digital Clutter">
  <meta property="og:description" content="Sort screenshots forever. The clutter never ends!">
  <meta property="og:image" content="https://dontwork.work/og-image.jpg">
  <meta property="og:url" content="https://dontwork.work/screenshot-organizer.html">
  
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Screenshot Organizer">
  <meta name="twitter:description" content="Organize endless screenshots. Digital hoarding at its finest!">
  <meta name="twitter:image" content="https://dontwork.work/twitter-card.jpg">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
      color: white;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.5rem, 7vw, 4rem);
      margin-bottom: 10px;
    }
    
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .desktop {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    
    .folders {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .folder {
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      padding: 20px;
      min-height: 120px;
      transition: all 0.3s;
      border: 3px dashed transparent;
    }
    
    .folder.drag-over {
      border-color: #4CAF50;
      background: rgba(76, 175, 80, 0.2);
    }
    
    .folder-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .folder-name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 5px;
    }
    
    .folder-count {
      font-size: 0.85rem;
      opacity: 0.7;
    }
    
    .screenshots-area {
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      padding: 25px;
      min-height: 300px;
    }
    
    .screenshots-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
    }
    
    .screenshot {
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 15px;
      cursor: move;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .screenshot:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.25);
    }
    
    .screenshot.dragging {
      opacity: 0.5;
    }
    
    .screenshot-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
    
    .screenshot-name {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    
    .btn {
      padding: 15px 35px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Fraunces', serif;
    }
    
    .new-btn {
      background: #4CAF50;
      color: white;
    }
    
    .auto-btn {
      background: #FF9800;
      color: white;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    
    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    .stat-box {
      background: rgba(255,255,255,0.2);
      padding: 20px 30px;
      border-radius: 12px;
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Fraunces', serif;
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-top: 5px;
    }
    
    .back-link {
      display: inline-block;
      color: white;
      text-decoration: none;
      padding: 15px 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      margin-top: 30px;
      transition: all 0.3s;
    }
    
    .back-link:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <!-- AD PLACEHOLDER - Top -->
  
  <div class="container">
    <h1>📸 Screenshot Organizer</h1>
    <p class="subtitle">They never stop accumulating. Good luck.</p>
    
    <div class="desktop">
      <div class="folders" id="folders"></div>
      
      <div class="screenshots-area">
        <div class="screenshots-title">📁 Unsorted Screenshots (<span id="unsortedCount">0</span>)</div>
        <div class="screenshots-grid" id="screenshotsGrid"></div>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn new-btn" onclick="addScreenshots()">📸 New Screenshots</button>
      <button class="btn auto-btn" onclick="autoOrganize()">✨ Auto-Organize</button>
    </div>
    
    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="organized">0</div>
        <div class="stat-label">Organized</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="unsorted">5</div>
        <div class="stat-label">Unsorted</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="efficiency">0%</div>
        <div class="stat-label">Efficiency</div>
      </div>
    </div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
  <!-- AD PLACEHOLDER - Bottom -->
  
  <script>
    const folderTypes = [
      { name: 'Work', icon: '💼', keywords: ['work', 'project', 'meeting'] },
      { name: 'Memes', icon: '😂', keywords: ['meme', 'funny', 'lol'] },
      { name: 'Recipes', icon: '🍳', keywords: ['recipe', 'food', 'cooking'] },
      { name: 'Random', icon: '🎲', keywords: ['random', 'misc', 'other'] }
    ];
    
    const screenshotTypes = [
      { icon: '💼', name: 'Screenshot_work_2026.png', category: 'Work' },
      { icon: '😂', name: 'meme_lol_funny.jpg', category: 'Memes' },
      { icon: '🍳', name: 'recipe_pasta.png', category: 'Recipes' },
      { icon: '📊', name: 'Screenshot_chart.png', category: 'Work' },
      { icon: '🎮', name: 'gaming_screenshot.png', category: 'Random' },
      { icon: '😂', name: 'funny_cat_meme.jpg', category: 'Memes' },
      { icon: '💼', name: 'meeting_notes.png', category: 'Work' },
      { icon: '🍕', name: 'pizza_recipe.png', category: 'Recipes' },
      { icon: '📱', name: 'Screenshot_error.png', category: 'Random' },
      { icon: '😂', name: 'meme_tweet.jpg', category: 'Memes' }
    ];
    
    let folders = {};
    let screenshots = [];
    let organizedCount = 0;
    let draggedElement = null;
    
    function init() {
      // Create folders
      const foldersDiv = document.getElementById('folders');
      folderTypes.forEach(folder => {
        folders[folder.name] = [];
        const div = document.createElement('div');
        div.className = 'folder';
        div.dataset.folder = folder.name;
        div.innerHTML = `
          <div class="folder-icon">${folder.icon}</div>
          <div class="folder-name">${folder.name}</div>
          <div class="folder-count" id="count-${folder.name}">0 files</div>
        `;
        div.addEventListener('dragover', handleDragOver);
        div.addEventListener('drop', handleDrop);
        div.addEventListener('dragleave', handleDragLeave);
        foldersDiv.appendChild(div);
      });
      
      // Add initial screenshots
      for (let i = 0; i < 5; i++) {
        addNewScreenshot();
      }
    }
    
    function addNewScreenshot() {
      const template = screenshotTypes[Math.floor(Math.random() * screenshotTypes.length)];
      const screenshot = {
        id: Date.now() + Math.random(),
        ...template,
        name: template.name.replace('.', `_${Math.floor(Math.random() * 999)}.`)
      };
      screenshots.push(screenshot);
      renderScreenshots();
    }
    
    function renderScreenshots() {
      const grid = document.getElementById('screenshotsGrid');
      grid.innerHTML = '';
      
      screenshots.forEach(ss => {
        const div = document.createElement('div');
        div.className = 'screenshot';
        div.draggable = true;
        div.dataset.id = ss.id;
        div.dataset.category = ss.category;
        div.innerHTML = `
          <div class="screenshot-icon">${ss.icon}</div>
          <div class="screenshot-name">${ss.name}</div>
        `;
        div.addEventListener('dragstart', handleDragStart);
        div.addEventListener('dragend', handleDragEnd);
        grid.appendChild(div);
      });
      
      updateStats();
    }
    
    function handleDragStart(e) {
      draggedElement = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    
    function handleDragEnd(e) {
      this.classList.remove('dragging');
      draggedElement = null;
    }
    
    function handleDragOver(e) {
      if (e.preventDefault) {
        e.preventDefault();
      }
      e.dataTransfer.dropEffect = 'move';
      this.classList.add('drag-over');
      return false;
    }
    
    function handleDragLeave(e) {
      this.classList.remove('drag-over');
    }
    
    function handleDrop(e) {
      if (e.stopPropagation) {
        e.stopPropagation();
      }
      
      this.classList.remove('drag-over');
      
      if (draggedElement) {
        const folderName = this.dataset.folder;
        const screenshotId = draggedElement.dataset.id;
        const screenshot = screenshots.find(s => s.id == screenshotId);
        
        if (screenshot) {
          folders[folderName].push(screenshot);
          screenshots = screenshots.filter(s => s.id != screenshotId);
          organizedCount++;
          
          updateFolderCount(folderName);
          renderScreenshots();
        }
      }
      
      return false;
    }
    
    function updateFolderCount(folderName) {
      const count = folders[folderName].length;
      const countEl = document.getElementById(`count-${folderName}`);
      if (countEl) {
        countEl.textContent = `${count} file${count !== 1 ? 's' : ''}`;
      }
    }
    
    function addScreenshots() {
      const count = Math.floor(Math.random() * 3) + 2; // 2-4 new screenshots
      for (let i = 0; i < count; i++) {
        addNewScreenshot();
      }
    }
    
    function autoOrganize() {
      screenshots.forEach(ss => {
        folders[ss.category].push(ss);
        organizedCount++;
      });
      
      screenshots = [];
      
      folderTypes.forEach(folder => {
        updateFolderCount(folder.name);
      });
      
      renderScreenshots();
    }
    
    function updateStats() {
      document.getElementById('organized').textContent = organizedCount;
      document.getElementById('unsorted').textContent = screenshots.length;
      document.getElementById('unsortedCount').textContent = screenshots.length;
      
      const total = organizedCount + screenshots.length;
      const efficiency = total > 0 ? Math.floor((organizedCount / total) * 100) : 0;
      document.getElementById('efficiency').textContent = efficiency + '%';
    }
    
    // Auto-add screenshots periodically
    setInterval(() => {
      if (screenshots.length < 15) {
        addNewScreenshot();
      }
    }, 8000);
    
    // Load saved stats
    const saved = localStorage.getItem('screenshotOrgStats');
    if (saved) {
      const stats = JSON.parse(saved);
      organizedCount = stats.organized || 0;
    }
    
    // Save on unload
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('screenshotOrgStats', JSON.stringify({
        organized: organizedCount
      }));
    });
    
    init();
  </script>
  
  <script src="/js/panic-button.js"></script>
</body>
</html>
