    let currentCard = null;
    
    function generate() {
      currentCard = CARDS[Math.floor(Math.random() * CARDS.length)];
      document.getElementById('cardContent').textContent = currentCard.content;
      document.getElementById('resultCard').classList.add('show');
      updateCollection(currentCard.id);
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    function updateCollection(cardId) {
      const seen = JSON.parse(localStorage.getItem('seenSickCards') || '[]');
      if (!seen.includes(cardId)) {
        seen.push(cardId);
        localStorage.setItem('seenSickCards', JSON.stringify(seen));
      }
      const stars = seen.map(() => '⭐').join('') + Array(10 - seen.length).fill('⬜').join('');
      document.getElementById('collectionStars').textContent = stars;
      document.getElementById('collectionCount').textContent = `${seen.length}/10`;
    }
    
    function shareTwitter() {
      const text = currentCard.shareText + '\n\ndontwork.work/tools/call-in-sick';
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
    }
    
    function copyLink() {
      navigator.clipboard.writeText('https://dontwork.work/tools/call-in-sick');
      alert('Link copied! 📋');
    }
    
    function tryAgain() {
      document.getElementById('resultCard').classList.remove('show');
    }
    
    function randomAffiliate() {
      const categories = ['/shop/mattresses', '/shop/coffee-makers'];
      window.location.href = categories[Math.floor(Math.random() * categories.length)];
    }
    
    updateCollection('');
