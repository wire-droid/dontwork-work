<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="/css/main.css">
<style>
body{background:linear-gradient(135deg,#FFA17F 0%,#00223E 100%);min-height:100vh;padding:20px}.container{max-width:700px;margin:40px auto}.header{text-align:center;color:white;margin-bottom:40px}h1{font-family:'Fraunces',serif;font-size:clamp(2.5rem,6vw,4rem);margin-bottom:15px}.subtitle{font-size:1.2rem;opacity:0.9}.box{background:white;border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.3);margin-bottom:30px;text-align:center}.btn{width:100%;padding:25px;font-size:1.8rem;font-family:'Fraunces',serif;font-weight:700;background:linear-gradient(135deg,#FFA17F 0%,#00223E 100%);color:white;border:none;border-radius:12px;cursor:pointer;transition:all 0.3s}.btn:hover{transform:translateY(-2px)}.result{display:none;background:white;border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.3);margin-bottom:30px}.result.show{display:block;animation:slideUp 0.5s}@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}.card{font-family:'Courier New',monospace;white-space:pre-wrap;background:#f5f5f5;padding:25px;border-radius:12px;border:2px solid #333;font-size:0.9rem;line-height:1.4;margin-bottom:25px}.btns{display:flex;gap:12px;flex-wrap:wrap}.sbtn{flex:1;min-width:140px;padding:15px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:all 0.3s}.sbtn:hover{transform:translateY(-2px)}.tw{background:#1DA1F2;color:white}.cp{background:#34495e;color:white}.ag{background:linear-gradient(135deg,#FFA17F 0%,#00223E 100%);color:white}.aff{background:linear-gradient(135deg,#FF6B35 0%,#F7C548 100%);border-radius:20px;padding:30px;text-align:center;color:white;margin-top:30px}.aff h3{font-family:'Fraunces',serif;font-size:1.8rem;margin-bottom:15px}.aff button{background:white;color:#FF6B35;padding:15px 35px;border:none;border-radius:12px;font-size:1.2rem;font-weight:700;cursor:pointer}.coll{text-align:center;margin-top:20px;padding:15px;background:#fff3e0;border-radius:10px}
</style>
</head>
<body>
<!-- AD PLACEHOLDER - Top -->
<div class="container">
<div class="header"><h1>⏰ Is It Too Early/Late?</h1><p class="subtitle">Judging your questionable timing since 2026.</p></div>
<div class="box"><button class="btn" onclick="judge()">⏰ Judge My Timing</button></div>
<div class="result" id="r"><div class="card" id="c"></div><div class="btns"><button class="sbtn tw" onclick="share()">🐦 Share</button><button class="sbtn cp" onclick="copy()">📋 Copy</button><button class="sbtn ag" onclick="again()">🔄 Again</button></div><div class="coll"><div style="font-size:1.5rem;margin:10px 0" id="s"></div><p><strong id="n">0/10</strong> timing judgments collected</p></div></div>
<div class="aff"><h3>Feeling Impulsive?</h3><p style="opacity:0.9;margin-bottom:20px">Bad timing for everything...</p><button onclick="aff()">Show Me Random Stuff 🎁</button></div>
<p style="text-align:center;margin-top:30px"><a href="/" style="color:white;text-decoration:none;opacity:0.8">← Back</a></p>
</div>
<!-- AD PLACEHOLDER - Bottom -->
<script>

{id:'time-eat-late',c:`┌─────────────────────────────────────┐

{id:'time-quit-early',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │

└─────────────────────────────────────┘`,s:'Too early to quit my job? Been here 2 weeks. Red flags: numerous. Quitting: imminent. 🏃'},
{id:'time-coffee-late',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │
│ ─────────────────────────────────── │
│ QUESTION: Too late for coffee?      │
│ ANSWER: Do you want to sleep?       │
│                                     │

│ BEDTIME: Theoretically 11 PM        │

└─────────────────────────────────────┘`,s:'Too late for coffee? Do I want to sleep? No. Drinking coffee at 9 PM. Sleep is for the weak. ☕'},
{id:'time-apologize-late',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │
│ ─────────────────────────────────── │
│ QUESTION: Too late to apologize?    │
│ ANSWER: Depends how bad it was.     │

│ • Medium offense: 2 weeks           │
│ • Major offense: Never expires      │
│                                     │

│ dontwork.work/tools/too-early-late  │
└─────────────────────────────────────┘`,s:'Too late to apologize? 6 months later. Judgment: Just do it already. Sending the text... 📨'},
{id:'time-gym-early',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │
│ ─────────────────────────────────── │
│ QUESTION: Too early for gym?        │

│                                     │
│ CURRENT TIME: 5:00 AM               │

│ GYM PEOPLE: Already there           │
│                                     │
│ WHO GOES TO GYM AT 5 AM:            │
│ • People with discipline            │
│ • People avoiding their families    │
│ • People who hate themselves        │
│ • People training for something     │

│ JUDGMENT: Respect the dedication.   │
│ But also, just sleep. The gym will  │

│ dontwork.work/tools/too-early-late  │
└─────────────────────────────────────┘`,s:'5 AM gym? That\'s psychopath hours. Judgment: Respect but also just sleep. Going back to bed. 😴'},
{id:'time-call-mom',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │
│ ─────────────────────────────────── │
│ QUESTION: Too late to call mom?     │
│ ANSWER: It's never too late.        │
│                                     │
│ MOM STATUS: Waiting for your call   │
│ TIME SINCE LAST CALL: Too long      │
│ HER FEELINGS: You could call more   │
│                                     │
│ ACCEPTABLE CALL TIMES FOR MOM:      │
│ • Morning: Yes                      │

│ • Evening: Yes                      │
│ • Late night: She's probably awake  │

│ dontwork.work/tools/too-early-late  │
└─────────────────────────────────────┘`,s:'Too late to call mom? NEVER. She birthed me. Currently calling... 📞'},
{id:'time-start-diet',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │
│ ─────────────────────────────────── │
│ QUESTION: Too late to start diet?   │

│                                     │

│ "I'll start tomorrow."              │
│ Tomorrow comes: "I'll start Monday."│
│ Monday comes: "Next month."         │
│                                     │
│ REALITY CHECK:                      │
│ Starting a diet at night is just    │
│ setting yourself up for midnight    │
│ snack guilt. Start tomorrow. Maybe. │
│                                     │
│ dontwork.work/tools/too-early-late  │
└─────────────────────────────────────┘`,s:'Too late to start diet? 9 PM after eating. Starting tomorrow. Or Monday. Definitely next month. 🍕'},
{id:'time-send-email',c:`┌─────────────────────────────────────┐
│ ⏰ TIMING JUDGMENT RENDERED ⏰       │
│ ─────────────────────────────────── │
│ QUESTION: Too late to send email?   │
│ ANSWER: Schedule send exists.       │
│                                     │
│ CURRENT TIME: 11 PM                 │

│                                     │

│ Message: "I'm organized"            │
│ Reality: You're up at 11 PM anyway  │
│                                     │

│ work-life balance you don't have.   │

└─────────────────────────────────────┘`,s:'Too late to email boss? 11 PM. Scheduling for 9 AM. Faking work-life balance I don\'t have. 📧'}
];
let cur=null;
function judge(){cur=CARDS[Math.floor(Math.random()*CARDS.length)];document.getElementById('c').textContent=cur.c;document.getElementById('r').classList.add('show');upd(cur.id);document.getElementById('r').scrollIntoView({behavior:'smooth',block:'center'})}
function upd(id){const seen=JSON.parse(localStorage.getItem('seenTimeCards')||'[]');if(!seen.includes(id)){seen.push(id);localStorage.setItem('seenTimeCards',JSON.stringify(seen))}const stars=seen.map(()=>'⭐').join('')+Array(10-seen.length).fill('⬜').join('');document.getElementById('s').textContent=stars;document.getElementById('n').textContent=seen.length+'/10'}
function share(){const txt=cur.s+'\n\ndontwork.work/tools/too-early-late';window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank')}
function copy(){navigator.clipboard.writeText('https://dontwork.work/tools/too-early-late');alert('Link copied! 📋')}
function again(){document.getElementById('r').classList.remove('show')}
function aff(){window.location.href='/shop/shop.html'}
upd('');
</script>
<script src="/js/panic-button.js"></script>
</body>
</html>
