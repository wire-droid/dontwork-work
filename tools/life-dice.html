<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Decision Dice - Roll for Major Decisions | DontWork.work</title>
<meta name="description" content="Can't make a life decision? Roll the dice. Let fate decide your future. Major decisions made easy.">
<meta property="og:title" content="Life Decision Dice - Let Fate Decide">
<meta property="og:description" content="Roll the dice for major life decisions. Let fate decide your future.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
body{background:linear-gradient(135deg,#FF4E50 0%,#F9D423 100%);min-height:100vh;padding:20px}.container{max-width:700px;margin:40px auto}.header{text-align:center;color:white;margin-bottom:40px}h1{font-family:'Fraunces',serif;font-size:clamp(2.5rem,6vw,4rem);margin-bottom:15px}.subtitle{font-size:1.2rem;opacity:0.9}.box{background:white;border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.3);margin-bottom:30px;text-align:center}.btn{width:100%;padding:25px;font-size:1.8rem;font-family:'Fraunces',serif;font-weight:700;background:linear-gradient(135deg,#FF4E50 0%,#F9D423 100%);color:white;border:none;border-radius:12px;cursor:pointer;transition:all 0.3s}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.4)}.result{display:none;background:white;border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.3);margin-bottom:30px}.result.show{display:block;animation:slideUp 0.5s}@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}.card{font-family:'Courier New',monospace;white-space:pre-wrap;background:#f5f5f5;padding:25px;border-radius:12px;border:2px solid #333;font-size:0.9rem;line-height:1.4;margin-bottom:25px}.btns{display:flex;gap:12px;flex-wrap:wrap}.sbtn{flex:1;min-width:140px;padding:15px;border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:all 0.3s}.sbtn:hover{transform:translateY(-2px)}.tw{background:#1DA1F2;color:white}.cp{background:#34495e;color:white}.ag{background:linear-gradient(135deg,#FF4E50 0%,#F9D423 100%);color:white}.aff{background:linear-gradient(135deg,#FF6B35 0%,#F7C548 100%);border-radius:20px;padding:30px;text-align:center;color:white;margin-top:30px}.aff h3{font-family:'Fraunces',serif;font-size:1.8rem;margin-bottom:15px}.aff button{background:white;color:#FF6B35;padding:15px 35px;border:none;border-radius:12px;font-size:1.2rem;font-weight:700;cursor:pointer}.coll{text-align:center;margin-top:20px;padding:15px;background:#fff3e0;border-radius:10px}
</style>
</head>
<body>
<!-- AD PLACEHOLDER - Top -->
<div class="container">
<div class="header"><h1>🎲 Life Decision Dice</h1><p class="subtitle">When logic fails, roll the dice.</p></div>
<div class="box"><button class="btn" onclick="roll()">🎲 Roll the Dice</button></div>
<div class="result" id="r"><div class="card" id="c"></div><div class="btns"><button class="sbtn tw" onclick="share()">🐦 Share</button><button class="sbtn cp" onclick="copy()">📋 Copy</button><button class="sbtn ag" onclick="again()">🔄 Roll Again</button></div><div class="coll"><div style="font-size:1.5rem;margin:10px 0" id="s"></div><p><strong id="n">0/10</strong> dice rolls collected</p></div></div>
<div class="aff"><h3>Feeling Impulsive?</h3><p style="opacity:0.9;margin-bottom:20px">Since fate is deciding anyway...</p><button onclick="aff()">Show Me Random Stuff 🎁</button></div>
<p style="text-align:center;margin-top:30px"><a href="/" style="color:white;text-decoration:none;opacity:0.8">← Back to Home</a></p>
</div>
<!-- AD PLACEHOLDER - Bottom -->
<script>
const CARDS=[
{id:'dice-yes',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: DO IT                       │
│                                     │
│ The dice have spoken.               │
│ Your fate is sealed.                │
│ No backing out now.                 │
│                                     │
│ COSMIC PROBABILITY: 100%            │
│ REGRET PROBABILITY: TBD             │
│                                     │
│ The universe says: GO FOR IT.       │
│ Logic says: Maybe reconsider.       │
│ The dice say: TOO LATE.             │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Rolled the dice for a major life decision. Result: DO IT. The dice have spoken. No backing out. 🎲'},
{id:'dice-no',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: DON'T DO IT                 │
│                                     │
│ The universe says no.               │
│ Listen to the dice.                 │
│ They know better than you.          │
│                                     │
│ WISDOM LEVEL: Maximum               │
│ YOUR DISAPPOINTMENT: High           │
│                                     │
│ Sometimes the best decision is      │
│ not to decide. The dice saved you.  │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Life decision dice says: DON\'T DO IT. Guess I\'m not doing the thing. Dice wisdom prevails. 🎲'},
{id:'dice-wait',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: WAIT                        │
│                                     │
│ Not yet.                            │
│ Timing is everything.               │
│ Roll again in 6 months.             │
│                                     │
│ PATIENCE REQUIRED: Yes              │
│ IMMEDIATE GRATIFICATION: Denied     │
│                                     │
│ The dice are teaching you patience. │
│ Or procrastination. Same thing.     │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Dice verdict: WAIT. Not yet. Rolling again in 6 months. Patience unlocked. ⏰'},
{id:'dice-chaos',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: MAXIMUM CHAOS               │
│                                     │
│ Do the most chaotic version.        │
│ Consequences be damned.             │
│ Create problems on purpose.         │
│                                     │
│ CHAOS LEVEL: 10/10                  │
│ RESPONSIBILITY: 0/10                │
│                                     │
│ The dice want entertainment.        │
│ Be the chaos you wish to see.       │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Rolled for life decision. Result: MAXIMUM CHAOS. Time to create problems on purpose. 😈'},
{id:'dice-safe',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: PLAY IT SAFE                │
│                                     │
│ Boring but responsible.             │
│ Your future self will thank you.    │
│ Your present self: disappointed.    │
│                                     │
│ EXCITEMENT LEVEL: Low               │
│ REGRET PROBABILITY: Also low        │
│                                     │
│ Sometimes the dice choose wisdom.   │
│ Sometimes that wisdom is boring.    │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Life dice: PLAY IT SAFE. Boring but responsible. Future me: relieved. Present me: disappointed. 😑'},
{id:'dice-yolo',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: YOLO MODE ACTIVATED         │
│                                     │
│ Life's short.                       │
│ Consequences are future you's       │
│ problem. Live NOW.                  │
│                                     │
│ REGRET DEFERRAL: Activated          │
│ PRESENT ENJOYMENT: Maximum          │
│                                     │
│ The dice say: You only live once.   │
│ Make it count. Or make it chaotic.  │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Decision dice: YOLO MODE ACTIVATED. Consequences = future me\'s problem. Current me: thriving. 🎉'},
{id:'dice-ask',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: ASK YOUR MOM                │
│                                     │
│ She knows best.                     │
│ The dice defer to maternal wisdom.  │
│ Call her right now.                 │
│                                     │
│ MOM WISDOM: Infinite                │
│ DICE WISDOM: Humble                 │
│                                     │
│ Even cosmic randomness respects     │
│ your mother's judgment.             │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Rolled dice for life decision. Answer: ASK YOUR MOM. Even dice respect mom\'s wisdom. 📞'},
{id:'dice-coin',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: FLIP A COIN                 │
│                                     │
│ Even the dice won't decide this.    │
│ Too big. Too important.             │
│ Good luck.                          │
│                                     │
│ DICE CONFIDENCE: 0%                 │
│ YOUR OPTIONS: Coin or chaos         │
│                                     │
│ When dice refuse to decide, you     │
│ know it's serious. Or hilarious.    │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Life decision too big for dice. Dice says: FLIP A COIN. I need a coin now. 🪙'},
{id:'dice-regret',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: DO IT BUT REGRET IT LATER   │
│                                     │
│ Classic move.                       │
│ Peak life decisions.                │
│ This is the way.                    │
│                                     │
│ IMMEDIATE SATISFACTION: High        │
│ LONG-TERM SATISFACTION: Low         │
│                                     │
│ The dice know you well.             │
│ This is your brand.                 │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Dice verdict: DO IT BUT REGRET IT LATER. This is the way. No regrets. Wait... 🤷'},
{id:'dice-both',c:`┌─────────────────────────────────────┐
│ 🎲 LIFE DECISION: DICE ROLLED 🎲    │
│ ─────────────────────────────────── │
│                                     │
│ RESULT: DO BOTH                     │
│                                     │
│ Why choose?                         │
│ Have your cake and regret it too.   │
│ Maximum effort. Maximum chaos.      │
│                                     │
│ EFFICIENCY: Questionable            │
│ AMBITION: Admirable                 │
│                                     │
│ The dice believe in your ability    │
│ to juggle poor decisions.           │
│                                     │
│ dontwork.work/tools/life-dice       │
└─────────────────────────────────────┘`,s:'Can\'t decide between two options. Dice: DO BOTH. Efficiency or chaos? Yes. ✨'}
];
let cur=null;
function roll(){cur=CARDS[Math.floor(Math.random()*CARDS.length)];document.getElementById('c').textContent=cur.c;document.getElementById('r').classList.add('show');upd(cur.id);document.getElementById('r').scrollIntoView({behavior:'smooth',block:'center'})}
function upd(id){const seen=JSON.parse(localStorage.getItem('seenDiceCards')||'[]');if(!seen.includes(id)){seen.push(id);localStorage.setItem('seenDiceCards',JSON.stringify(seen))}const stars=seen.map(()=>'⭐').join('')+Array(10-seen.length).fill('⬜').join('');document.getElementById('s').textContent=stars;document.getElementById('n').textContent=seen.length+'/10'}
function share(){const txt=cur.s+'\n\ndontwork.work/tools/life-dice';window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank')}
function copy(){navigator.clipboard.writeText('https://dontwork.work/tools/life-dice');alert('Link copied! 📋')}
function again(){document.getElementById('r').classList.remove('show')}
function aff(){window.location.href='/shop/shop.html'}
upd('');
</script>
<script src="/js/panic-button.js"></script>
</body>
</html>
