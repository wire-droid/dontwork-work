      }

      margin-bottom: 25px;
    }
    
    .share-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .share-btn {
      flex: 1;
      min-width: 140px;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;

    .try-again { background: #FF6B35; color: white; }

    let currentCard = null;
    
    function decide() {
      currentCard = CARDS[Math.floor(Math.random() * CARDS.length)];
      document.getElementById('cardContent').textContent = currentCard.content;
      document.getElementById('resultCard').classList.add('show');
      updateCollection(currentCard.id);
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    function updateCollection(cardId) {
      const seen = JSON.parse(localStorage.getItem('seenFoodCards') || '[]');
      if (!seen.includes(cardId)) {
        seen.push(cardId);
        localStorage.setItem('seenFoodCards', JSON.stringify(seen));
      }
      const stars = seen.map(() => '⭐').join('') + Array(10 - seen.length).fill('⬜').join('');
      document.getElementById('collectionStars').textContent = stars;
      document.getElementById('collectionCount').textContent = `${seen.length}/10`;
    }
    
    function shareTwitter() {
      const text = currentCard.shareText + '\n\ndontwork.work/tools/what-to-eat';
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
    }
    
    function copyLink() {
      navigator.clipboard.writeText('https://dontwork.work/tools/what-to-eat');
      alert('Link copied! 📋');
    }
    
    function tryAgain() {
      document.getElementById('resultCard').classList.remove('show');
    }

    }
