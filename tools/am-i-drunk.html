    let currentCard = null;
    
    function runTest() {
      currentCard = CARDS[Math.floor(Math.random() * CARDS.length)];
      document.getElementById('cardContent').textContent = currentCard.content;
      document.getElementById('resultCard').classList.add('show');
      updateCollection(currentCard.id);
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    function updateCollection(cardId) {
      const seen = JSON.parse(localStorage.getItem('seenDrunkCards') || '[]');
      if (!seen.includes(cardId)) {
        seen.push(cardId);
        localStorage.setItem('seenDrunkCards', JSON.stringify(seen));
      }
      const stars = seen.map(() => '⭐').join('') + Array(10 - seen.length).fill('⬜').join('');
      document.getElementById('collectionStars').textContent = stars;
      document.getElementById('collectionCount').textContent = `${seen.length}/10`;
    }
    
    function shareTwitter() {
      const text = currentCard.shareText + '\n\ndontwork.work/tools/am-i-drunk';
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
    }
    
    function copyLink() {
      navigator.clipboard.writeText('https://dontwork.work/tools/am-i-drunk');
      alert('Link copied! 📋');
    }
    
    function tryAgain() {
      document.getElementById('resultCard').classList.remove('show');
