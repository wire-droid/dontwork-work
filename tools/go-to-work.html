{id:'work-lottery',c:`┌─────────────────────────────────────┐

let cur=null;
function decide(){cur=CARDS[Math.floor(Math.random()*CARDS.length)];document.getElementById('c').textContent=cur.c;document.getElementById('r').classList.add('show');upd(cur.id);document.getElementById('r').scrollIntoView({behavior:'smooth',block:'center'})}
function upd(id){const seen=JSON.parse(localStorage.getItem('seenWorkCards')||'[]');if(!seen.includes(id)){seen.push(id);localStorage.setItem('seenWorkCards',JSON.stringify(seen))}const stars=seen.map(()=>'⭐').join('')+Array(10-seen.length).fill('⬜').join('');document.getElementById('s').textContent=stars;document.getElementById('n').textContent=seen.length+'/10'}
function share(){const txt=cur.s+'\n\ndontwork.work/tools/go-to-work';window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank')}
function copy(){navigator.clipboard.writeText('https://dontwork.work/tools/go-to-work');alert('Link copied! 📋')}
function again(){document.getElementById('r').classList.remove('show')}
function aff(){const c=['/shop/mattresses','/shop/coffee-makers'];window.location.href=c[Math.floor(Math.random()*c.length)]}
upd('');
</script>
