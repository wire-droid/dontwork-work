    let currentQuestion = '';
    let currentCard = null;
    
    function askQuestion() {
      const input = document.getElementById('questionInput');
      currentQuestion = input.value.trim() || 'Should I do the thing?';
      
      // Select random card
      currentCard = CARDS[Math.floor(Math.random() * CARDS.length)];
      
      // Format content
      let content = currentCard.content.replace(/\{QUESTION\}/g, 
        currentQuestion.length > 50 ? currentQuestion.substring(0, 47) + '...' : currentQuestion
      );
      
      // Display card
      document.getElementById('cardContent').textContent = content;
      document.getElementById('resultCard').classList.add('show');
      
      // Update collection
      updateCollection(currentCard.id);
      
      // Scroll to result
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    function updateCollection(cardId) {
      const seen = JSON.parse(localStorage.getItem('seenShouldICards') || '[]');
      if (!seen.includes(cardId)) {
        seen.push(cardId);
        localStorage.setItem('seenShouldICards', JSON.stringify(seen));
      }
      
      const stars = seen.map(() => '⭐').join('') + Array(10 - seen.length).fill('⬜').join('');
      document.getElementById('collectionStars').textContent = stars;
      document.getElementById('collectionCount').textContent = `${seen.length}/10`;
    }
    
    function shareTwitter() {
      const text = currentCard.shareText + `\n\nQuestion: "${currentQuestion}"\n\ndontwork.work/tools/should-i`;
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
    }
    
    function copyLink() {
      navigator.clipboard.writeText('https://dontwork.work/tools/should-i');
      alert('Link copied! 📋');
    }
    
    function tryAgain() {
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('questionInput').value = '';
      document.getElementById('questionInput').focus();
    }
    
    function randomAffiliate() {
      window.location.href = '/shop/shop.html';
    }
    
    // Enter key support
    document.getElementById('questionInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') askQuestion();
    });
    
    // Load collection on start
    updateCollection('');
